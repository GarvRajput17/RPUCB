dataset: citeulike
data_path: data/citeulike
num_negatives: 8
batch_size: 256
epochs: 10
lr: 0.001
embed_dim: 64
rl_layers: [1024, 512, 64]      # citeulike has many items; same adjustment
ml_layers: [1024, 512, 64]
attn_heads: 2
attn_dim: 64
lambda_l1: 0.0001
dropout: 0.0
gamma_init: 2.0
beta: 0.05
seed: 42
